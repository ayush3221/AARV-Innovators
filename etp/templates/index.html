<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartETP | SCADA Advanced</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-deep: #0b0e1a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1a1f35, #0b0e1a);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        /* Top Grid Styles */
        .card-purple { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); }
        .card-cyan { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
        .card-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .card-dark { background: linear-gradient(135deg, #434343 0%, #000000 100%); }

        .stat-val { font-size: 1.8rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }

        .chart-box { height: 300px; width: 100%; }
        .status-pill { border-radius: 50px; padding: 5px 15px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">ETP PERFORMANCE <span style="color: var(--neon-blue)">DASHBOARD</span></h3>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="liveMode" onchange="toggleLive()">
            <label class="form-check-label text-white-50" for="liveMode">Live SCADA Stream</label>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="glass-card card-purple shadow">
                <div class="stat-label">Oil & Grease (O&G)</div>
                <div class="stat-val" id="disp-og">--</div>
                <small>mg/L (Standard < 10)</small>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card card-cyan shadow">
                <div class="stat-label">Cyanide (as CN)</div>
                <div class="stat-val" id="disp-cn">--</div>
                <small>mg/L (Standard < 0.2)</small>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card card-orange shadow">
                <div class="stat-label">Ammonical Nitrogen</div>
                <div class="stat-val" id="disp-an">--</div>
                <small>mg/L (Standard < 50)</small>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card card-dark shadow">
                <div class="stat-label">System pH</div>
                <div class="stat-val" id="disp-ph">--</div>
                <small id="ph-status">Neutralizing...</small>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">BOD Treatment Trend (Raw vs Treated)</h5>
                    <span id="comp-badge" class="status-pill bg-secondary text-white">IDLE</span>
                </div>
                <div class="chart-box">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card h-100">
                <h5 class="mb-3">Live Log Feed</h5>
                <div id="log-container" style="max-height: 300px; overflow-y: hidden; font-family: monospace; font-size: 0.8rem;">
                    <div class="text-muted">Waiting for stream initiation...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let chart;
    let liveTimer;

    // Initialize the Chart
    function initChart() {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Raw BOD', data: [], borderColor: '#6a11cb', tension: 0.4, fill: false },
                    { label: 'Treated BOD', data: [], borderColor: '#00f260', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 242, 96, 0.1)' }
                ]
            },
            options: { maintainAspectRatio: false, scales: { y: { grid: { color: '#222' }, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } }, plugins: { legend: { labels: { color: '#fff' } } } }
        });
    }

    async function updateData() {
        try {
            const response = await fetch('/live-data');
            const data = await response.json();

            // Update UI Numbers
            document.getElementById('disp-og').innerText = data.output_treated.og_out;
            document.getElementById('disp-cn').innerText = data.output_treated.cn_out;
            document.getElementById('disp-an').innerText = data.output_treated.an_out;
            document.getElementById('disp-ph').innerText = data.output_treated.ph_out;

            // Compliance Badge
            const badge = document.getElementById('comp-badge');
            badge.innerText = data.output_treated.compliance === "PASSED" ? "COMPLIANT" : "ALERT: NON-COMPLIANT";
            badge.className = `status-pill ${data.output_treated.compliance === "PASSED" ? 'bg-success' : 'bg-danger'}`;

            // Chart Update
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(data.input_sensor.bod);
            chart.data.datasets[1].data.push(data.output_treated.bod_out);

            if(chart.data.labels.length > 12) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(d => d.data.shift());
            }
            chart.update();

            // Log Feed
            const log = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.innerHTML = `<span class="text-info">[${time}]</span> BOD Out: ${data.output_treated.bod_out} mg/L | pH: ${data.output_treated.ph_out}`;
            log.prepend(entry);
            if(log.children.length > 8) log.lastChild.remove();

        } catch (e) { console.error("Stream Error", e); }
    }

    function toggleLive() {
        if(document.getElementById('liveMode').checked) {
            updateData();
            liveTimer = setInterval(updateData, 3000);
        } else {
            clearInterval(liveTimer);
        }
    }

    initChart();
</script>
</body>
</html>
